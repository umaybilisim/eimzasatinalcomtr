<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: Inter, Arial, sans-serif; }
.bg {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
  position: relative;
  overflow: hidden;
}
.circle1 {
  position: absolute; right: -80px; top: -80px;
  width: 500px; height: 500px; border-radius: 50%;
  background: rgba(26,86,219,0.18);
}
.circle2 {
  position: absolute; left: -60px; bottom: -60px;
  width: 360px; height: 360px; border-radius: 50%;
  background: rgba(26,86,219,0.10);
}
.card {
  position: absolute; inset: 60px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
}
.content { position: absolute; left: 120px; top: 80px; }

/* Logo */
.logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
.logo-icon {
  width: 72px; height: 72px; border-radius: 14px;
  background: #1a56db;
  display: flex; align-items: center; justify-content: center;
}
.logo-text { line-height: 1; }
.logo-name { font-size: 36px; font-weight: 700; color: white; }
.logo-name span { color: #60a5fa; }
.logo-domain { font-size: 16px; color: #94a3b8; margin-top: 4px; }

.divider { width: 960px; height: 1px; background: rgba(255,255,255,0.10); margin-bottom: 32px; }

.headline { font-size: 52px; font-weight: 700; color: white; line-height: 1.15; margin-bottom: 16px; }
.headline span { color: #60a5fa; }
.sub { font-size: 22px; color: #94a3b8; margin-bottom: 36px; }

.badges { display: flex; gap: 12px; }
.badge {
  padding: 10px 24px; border-radius: 999px;
  background: rgba(26,86,219,0.35);
  color: white; font-size: 14px; font-weight: 600;
  border: 1px solid rgba(96,165,250,0.3);
}
</style>
</head>
<body>
<div class="bg">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="card"></div>
  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <path d="M20 5L31 11V25C31 31 26 36 20 39C14 36 9 31 9 25V11L20 5Z"
            fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
          <path d="M14 20L19 25L27 15"
            stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">e-imza<span>satinal</span></div>
        <div class="logo-domain">.com.tr</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="headline">E-İmza, KEP ve Zaman<br>Damgası <span>Satın Al</span></div>
    <div class="sub">TÜBİTAK onaylı &nbsp;·&nbsp; Hızlı aktivasyon &nbsp;·&nbsp; Uygun fiyat</div>
    <div class="badges">
      <div class="badge">Bireysel E-İmza</div>
      <div class="badge">Kurumsal E-İmza</div>
      <div class="badge">KEP</div>
      <div class="badge">Zaman Damgası</div>
    </div>
  </div>
</div>
</body>
</html>
